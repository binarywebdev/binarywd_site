# /etc/nginx/sites-available/binarywd.com.conf
# Bootstrap-форма: только :80, без SSL — пройдёт nginx -t сразу.
# Certbot --nginx сам добавит 443-блок и переведёт :80 в 301 → https.
#
# Все directives (gzip, headers, кеш) certbot скопирует в 443-блок автоматически.

server {
    listen 80;
    listen [::]:80;
    server_name binarywd.com www.binarywd.com;

    root /var/www/binarywd.com/dist;
    index index.html;

    # ACME challenge для certbot (рено-обновления тоже сюда)
    location /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        try_files $uri =404;
    }

    # www → root
    if ($host = www.binarywd.com) {
        return 301 $scheme://binarywd.com$request_uri;
    }

    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml+rss image/svg+xml;
    gzip_comp_level 6;

    # кеш статики
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # HTML без кеша
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # роутинг Astro
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
