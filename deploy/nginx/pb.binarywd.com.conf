# /etc/nginx/sites-available/pb.binarywd.com.conf
# Bootstrap-форма: только :80. Certbot --nginx добавит 443-блок.

upstream pocketbase {
    server 127.0.0.1:8090;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name pb.binarywd.com;

    location /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        try_files $uri =404;
    }

    client_max_body_size 100M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # CORS — для realtime SDK с binarywd.com
    # add_header Access-Control-Allow-Origin "https://binarywd.com" always;

    location / {
        proxy_pass http://pocketbase;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        # PB шлёт server-sent events — без буферизации
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/realtime {
        proxy_pass http://pocketbase;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
